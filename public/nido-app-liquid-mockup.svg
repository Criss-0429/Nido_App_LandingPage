<svg width="400" height="800" viewBox="0 0 400 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="10" width="380" height="780" rx="60" fill="black" />
  <rect x="20" y="20" width="360" height="760" rx="50" fill="url(#glass_grad)" fill-opacity="0.1" />
  <rect x="20" y="20" width="360" height="760" rx="50" stroke="white" stroke-opacity="0.2" stroke-width="2" />
  
  <!-- Dynamic Island -->
  <rect x="135" y="35" width="130" height="30" rx="15" fill="black" />
  
  <!-- UI Mockup Content -->
  <rect x="40" y="100" width="320" height="200" rx="24" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" />
  <rect x="60" y="120" width="100" height="12" rx="6" fill="white" fill-opacity="0.2" />
  <rect x="60" y="140" width="200" height="24" rx="8" fill="white" fill-opacity="0.4" />
  
  <circle cx="200" cy="500" r="100" fill="url(#accent_grad)" fill-opacity="0.3" filter="blur(40px)" />
  
  <rect x="40" y="320" width="150" height="200" rx="20" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" />
  <rect x="210" y="320" width="150" height="200" rx="20" fill="white" fill-opacity="0.05" stroke="white" stroke-opacity="0.1" />
  
  <defs>
    <linearGradient id="glass_grad" x1="0" y1="0" x2="400" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" />
      <stop offset="1" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="accent_grad" x1="100" y1="400" x2="300" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F29559" />
      <stop offset="1" stop-color="#8AE7BF" />
    </linearGradient>
  </defs>
</svg>
